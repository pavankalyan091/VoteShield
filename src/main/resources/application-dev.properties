spring.datasource.url=jdbc:h2:file:./data/voteshield-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Gmail SMTP Configuration ──────────────────────────────
# IMPORTANT: Replace these with your Gmail credentials
# Gmail App Password setup:
#   1. Google Account → Security → 2-Step Verification ON
#   2. Security → App Passwords → Generate password
#   3. Copy that 16-digit password here (not your Gmail password!)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
#spring.mail.username=YOUR_GMAIL@gmail.com
#spring.mail.password=YOUR_APP_PASSWORD
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
